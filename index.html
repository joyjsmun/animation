<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <link rel="stylesheet" href="styles.css" />
    <style>
        body{
            background-color:tomato;
            height:100vh;
            display:flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .dots{
            display:flex;
            justify-content: center;
            align-items: center;
            animation: clock 5s ease-in-out infinite;
        }

        @keyframes clock {
          from{transform: rotateZ(0deg)}
          to{transform: rotateZ(180deg)}
        }

        .dot{
            height:70px;
            width: 70px;
            border-radius: 50%;
            background-color: wheat;
            margin:30px;
        }
     

    </style>
  </head>
  <body>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="bars">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>
  </body>
</html>
