<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <style>

    body{
        display:flex;
        align-items: center;
        justify-content: center;
    }
@keyframes magic {
    0%{
        transform:rotateY(0)
    }
    50%{
        transform:rotateY(180deg) translateY(500px)
    }
    100%{
        transform:rotateY(0)
    }
}

img{
    height:200px;
    border-radius: 30%;
    animation:magic 3s infinite ease-in-out;
    
}


    </style>
  </head>
  <body>
 <img src="car.png"/>
  </body>
</html>
